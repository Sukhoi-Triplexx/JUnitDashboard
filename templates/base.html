<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images.png" type="image/png">
    <title>{% block title %}VUnit{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            background: #000000;
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar - чисто черный */
        .sidebar {
            width: 280px;
            background: #000000;
            border-right: 1px solid rgba(255, 107, 0, 0.2);
            padding: 30px 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        
        .logo {
            padding: 0 24px 30px 24px;
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 1.5em;
            background: linear-gradient(135deg, #ff6b00, #ff9f4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .logo p {
            font-size: 11px;
            color: #ff6b00;
            margin-top: 5px;
            opacity: 0.8;
        }
        
        .nav-menu {
            list-style: none;
            padding: 0 16px;
        }
        
        .nav-item {
            margin-bottom: 4px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }
        
        .nav-link:hover {
            background: rgba(255, 107, 0, 0.08);
            color: #ff9f4a;
        }
        
        .nav-link.active {
            background: rgba(255, 107, 0, 0.12);
            color: #ff6b00;
            border-left: 3px solid #ff6b00;
        }
        
        .nav-icon {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }
        
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px 40px;
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 107, 0, 0.2);
        }
        
        .page-title {
            font-size: 1.6em;
            font-weight: 600;
            background: linear-gradient(135deg, #ff6b00, #ff9f4a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.3px;
        }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .monitoring-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            padding: 6px 12px;
            background: rgba(255, 107, 0, 0.08);
            border-radius: 20px;
            color: #ff9f4a;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ff6b00;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #ff9f4a;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .sidebar .logo h1, .sidebar .logo p, .nav-link span:last-child {
                display: none;
            }
            .main-content {
                margin-left: 70px;
                padding: 20px;
            }
            .nav-link {
                justify-content: center;
                padding: 12px;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <h1>VUNIT<span style="color: #ff6b00;"></span></h1>
                <p>RTS INTELLIGENCE</p>
            </div>
            
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
                        <span class="nav-icon">📊</span>
                        <span>Upload</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/dashboard" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
                        <span class="nav-icon">📅</span>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/settings" class="nav-link {% if request.endpoint == 'settings_page' %}active{% endif %}">
                        <span class="nav-icon">⚙️</span>
                        <span>Settings</span>
                    </a>
                </li>
            </ul>
        </aside>
        
        <main class="main-content">
            <div class="top-bar">
                <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
                <div class="status-badge">
                    <div class="monitoring-status">
                        <span class="status-dot"></span>
                        <span>MONITORING: {% if config.auto_monitoring %}ACTIVE{% else %}OFF{% endif %}</span>
                    </div>
                </div>
            </div>
            
            {% block content %}{% endblock %}
        </main>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
